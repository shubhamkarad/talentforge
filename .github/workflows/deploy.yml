name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # 1. Apply Supabase migrations to the remote project
  # ---------------------------------------------------------------------------
  db:
    name: supabase · migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --yes

  # ---------------------------------------------------------------------------
  # 2. Deploy all 5 edge functions
  # ---------------------------------------------------------------------------
  functions:
    name: supabase · deploy functions
    runs-on: ubuntu-latest
    needs: db
    strategy:
      fail-fast: false
      matrix:
        fn:
          [
            score-fit,
            career-forecast,
            interview-prep,
            extract-profile,
            draft-job,
            draft-cover-letter,
          ]
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: set function secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase secrets set CEREBRAS_API_KEY=${{ secrets.CEREBRAS_API_KEY }} --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: deploy ${{ matrix.fn }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy ${{ matrix.fn }} --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

  # ---------------------------------------------------------------------------
  # 3. Deploy both Vercel projects in parallel
  # ---------------------------------------------------------------------------
  web:
    name: vercel · ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: db
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: recruiter-console
            project_id_secret: VERCEL_PROJECT_ID_RECRUITER
          - app: seeker-app
            project_id_secret: VERCEL_PROJECT_ID_SEEKER
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: install
        run: pnpm install --frozen-lockfile

      - name: install vercel CLI
        run: pnpm add -g vercel

      # Vercel CLI auto-reads VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID
      # from the env. Dropping the explicit --token flag avoids the empty-
      # string footgun where `--token=""` beats the env fallback and the CLI
      # errors with "no credentials found".
      - name: check required secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets[matrix.project_id_secret] }}
        run: |
          missing=()
          [ -z "$VERCEL_TOKEN" ]      && missing+=("VERCEL_TOKEN")
          [ -z "$VERCEL_ORG_ID" ]     && missing+=("VERCEL_ORG_ID")
          [ -z "$VERCEL_PROJECT_ID" ] && missing+=("${{ matrix.project_id_secret }}")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing GitHub secrets: ${missing[*]}"
            echo "Set them at: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi

      # Uploads the source tree and lets Vercel's build servers handle install
      # + build using the project's configured install command. Doing the
      # build locally via `vercel build` hits `spawn sh ENOENT` when Vercel
      # CLI tries to run the monorepo install command on the GitHub runner.
      - name: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets[matrix.project_id_secret] }}
        run: vercel deploy --prod --yes
        working-directory: apps/${{ matrix.app }}
